name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore MinhaApiSegura.csproj

    - name: Build
      run: dotnet build MinhaApiSegura.csproj --configuration Release

    - name: Run tests
      run: dotnet test --no-restore --verbosity normal
      
    - name: Build Docker image
      run: docker build -t minhaapisegura .

    - name: Run container
      run: docker run -d -p 5000:8080 --name minhaapi minhaapisegura

    - name: Wait for API
      run: sleep 15
    
    - name: Liberar permissões
      run: chmod -R 777 .

    - name: OWASP ZAP API Scan
      uses: zaproxy/action-api-scan@v0.6.0
      with:
      target: 'http://localhost:5000/swagger/v1/swagger.json'
      format: openapi
      fail_action: false
    
    
    - name: Upload ZAP Report
      uses: actions/upload-artifact@v4
      with:
        name: zap-report
        path: report_html.html